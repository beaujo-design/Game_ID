<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List Application</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 500px;
      padding: 30px;
    }

    h1 {
      color: #333;
      text-align: center;
      margin-bottom: 10px;
      font-size: 2.5em;
    }

    .subtitle {
      text-align: center;
      color: #999;
      margin-bottom: 30px;
      font-size: 0.9em;
    }

    .input-container {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    #todoInput {
      flex: 1;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.3s;
    }

    #todoInput:focus {
      outline: none;
      border-color: #667eea;
    }

    #addBtn {
      padding: 12px 25px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #addBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    #addBtn:active {
      transform: translateY(0);
    }

    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 15px;
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.3s;
      font-weight: 500;
    }

    .filter-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .filter-btn:hover {
      border-color: #667eea;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      text-align: center;
      margin-bottom: 25px;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 8px;
    }

    .stat {
      flex: 1;
    }

    .stat-number {
      font-size: 1.5em;
      font-weight: bold;
      color: #667eea;
    }

    .stat-label {
      font-size: 0.8em;
      color: #999;
      margin-top: 5px;
    }

    #todoList {
      list-style: none;
      max-height: 400px;
      overflow-y: auto;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 8px;
      margin-bottom: 10px;
      transition: all 0.3s;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .todo-item:hover {
      background: #f0f0f0;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .todo-item.completed {
      opacity: 0.6;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #999;
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #667eea;
    }

    .todo-text {
      flex: 1;
      font-size: 1em;
      color: #333;
      word-break: break-word;
    }

    .todo-priority {
      font-size: 0.75em;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    .priority-high {
      background: #ffebee;
      color: #c62828;
    }

    .priority-medium {
      background: #fff3e0;
      color: #e65100;
    }

    .priority-low {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .delete-btn {
      padding: 6px 12px;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.2s;
    }

    .delete-btn:hover {
      background: #ff5252;
      transform: scale(1.05);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 3em;
      margin-bottom: 10px;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .action-buttons button {
      flex: 1;
      padding: 10px;
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .action-buttons button:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .clear-completed {
      border-color: #ff6b6b;
      color: #ff6b6b;
    }

    .clear-completed:hover {
      border-color: #ff5252;
      color: #ff5252;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 2em;
      }

      .stats {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 To-Do List</h1>
    <p class="subtitle">Your tasks are automatically saved</p>

    <div class="input-container">
      <input 
        type="text" 
        id="todoInput" 
        placeholder="Add a new task..."
        autocomplete="off"
      >
      <button id="addBtn">Add</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-number" id="totalCount">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="completedCount">0</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="remainingCount">0</div>
        <div class="stat-label">Remaining</div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <ul id="todoList"></ul>

    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-state-icon">✨</div>
      <p>No tasks yet. Add one to get started!</p>
    </div>

    <div class="action-buttons">
      <button id="clearCompleted" class="clear-completed">Clear Completed</button>
      <button id="clearAll">Clear All</button>
    </div>
  </div>

  <script>
    // To-Do List Application with Local Storage
    class TodoApp {
      constructor() {
        this.todos = [];
        this.currentFilter = 'all';
        this.init();
      }

      init() {
        this.loadFromStorage();
        this.setupEventListeners();
        this.render();
      }

      setupEventListeners() {
        // Add todo
        document.getElementById('addBtn').addEventListener('click', () => this.addTodo());
        document.getElementById('todoInput').addEventListener('keypress', (e) => {
          if (e.key === 'Enter') this.addTodo();
        });

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            this.currentFilter = e.target.dataset.filter;
            this.render();
          });
        });

        // Clear buttons
        document.getElementById('clearCompleted').addEventListener('click', () => this.clearCompleted());
        document.getElementById('clearAll').addEventListener('click', () => {
          if (confirm('Are you sure you want to clear all tasks?')) {
            this.clearAll();
          }
        });
      }

      addTodo() {
        const input = document.getElementById('todoInput');
        const text = input.value.trim();

        if (!text) {
          alert('Please enter a task');
          return;
        }

        const todo = {
          id: Date.now(),
          text: text,
          completed: false,
          priority: 'medium',
          createdAt: new Date().toLocaleDateString()
        };

        this.todos.push(todo);
        input.value = '';
        this.saveToStorage();
        this.render();
      }

      toggleTodo(id) {
        const todo = this.todos.find(t => t.id === id);
        if (todo) {
          todo.completed = !todo.completed;
          this.saveToStorage();
          this.render();
        }
      }

      deleteTodo(id) {
        this.todos = this.todos.filter(t => t.id !== id);
        this.saveToStorage();
        this.render();
      }

      clearCompleted() {
        this.todos = this.todos.filter(t => !t.completed);
        this.saveToStorage();
        this.render();
      }

      clearAll() {
        this.todos = [];
        this.saveToStorage();
        this.render();
      }

      getFilteredTodos() {
        switch (this.currentFilter) {
          case 'active':
            return this.todos.filter(t => !t.completed);
          case 'completed':
            return this.todos.filter(t => t.completed);
          default:
            return this.todos;
        }
      }

      updateStats() {
        const total = this.todos.length;
        const completed = this.todos.filter(t => t.completed).length;
        const remaining = total - completed;

        document.getElementById('totalCount').textContent = total;
        document.getElementById('completedCount').textContent = completed;
        document.getElementById('remainingCount').textContent = remaining;
      }

      render() {
        const list = document.getElementById('todoList');
        const emptyState = document.getElementById('emptyState');
        const filtered = this.getFilteredTodos();

        list.innerHTML = '';

        if (filtered.length === 0) {
          emptyState.style.display = 'block';
          return;
        }

        emptyState.style.display = 'none';

        filtered.forEach(todo => {
          const li = document.createElement('li');
          li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
          li.innerHTML = `
            <input 
              type="checkbox" 
              ${todo.completed ? 'checked' : ''} 
              data-id="${todo.id}"
            >
            <span class="todo-text">${this.escapeHtml(todo.text)}</span>
            <span class="todo-priority priority-${todo.priority}">${todo.priority}</span>
            <button class="delete-btn" data-id="${todo.id}">Delete</button>
          `;

          // Add event listeners
          li.querySelector('input[type="checkbox"]').addEventListener('change', (e) => {
            this.toggleTodo(parseInt(e.target.dataset.id));
          });

          li.querySelector('.delete-btn').addEventListener('click', (e) => {
            this.deleteTodo(parseInt(e.target.dataset.id));
          });

          list.appendChild(li);
        });

        this.updateStats();
      }

      saveToStorage() {
        localStorage.setItem('todos', JSON.stringify(this.todos));
      }

      loadFromStorage() {
        const stored = localStorage.getItem('todos');
        this.todos = stored ? JSON.parse(stored) : [];
      }

      escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
    }

    // Initialize the app
    new TodoApp();
  </script>
</body>
</html>
